version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: legalos-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legalos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalos}
      POSTGRES_DB: ${POSTGRES_DB:-legalos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalos} -d ${POSTGRES_DB:-legalos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: legalos-app
    env_file:
      - .env.compose
    environment:
      ENV: development
      DEBUG: "false"
      APP_NAME: legal-os
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

volumes:
  pgdata:
