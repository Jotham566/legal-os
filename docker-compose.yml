version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: legalos-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legalos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalos}
      POSTGRES_DB: ${POSTGRES_DB:-legalos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalos} -d ${POSTGRES_DB:-legalos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
