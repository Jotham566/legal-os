apiVersion: apps/v1
kind: Deployment
metadata:
  name: legalos-app
  namespace: legalos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legalos-app
  template:
    metadata:
      labels:
        app: legalos-app
    spec:
      containers:
        - name: app
          image: legal-os:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: legalos-app-config
            - secretRef:
                name: legalos-app-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
