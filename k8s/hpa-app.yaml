apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: legalos-app
  namespace: legalos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: legalos-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
